<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500&family=Cabin:wght@400;600&family=Open+Sans&family=Roboto:wght@300;400&display=swap"
    rel="stylesheet">
<script src="https://kit.fontawesome.com/60726fbdb6.js" crossorigin="anonymous"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Roboto, sans-serif;
    }

    /* ---------- NAVBAR ---------- */

    #navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: #0f0f0f;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 25px;
        box-sizing: border-box;
        z-index: 1000;
        border-bottom: 1px solid #2a2a2a;
    }


    #navbar h1 {
        color: red;
        font-size: 30px;
        cursor: pointer;
    }

    #navbar img {
        width: 36px;
        height: 36px;
        object-fit: contain;
    }

    #navbar div {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .searchContainer {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 40px;
    }

    .searchSection {
        display: flex;
        align-items: center;
        flex: 1;
        justify-content: center;
        gap: 25px;
    }

    #query {
        width: 100%;
        max-width: 550px;
        height: 42px;
        padding: 0 18px;
        background: #121212;
        color: white;
        border: 1px solid #303030;
        border-radius: 22px 0 0 22px;
        outline: none;
        font-size: 15px;
    }

    #query:focus {
        border-color: #3ea6ff;
    }

    #search {
        margin-left: -10px;
        width: 65px;
        height: 42px;
        background: #222;
        color: white;
        border: 1px solid #303030;
        border-left: none;
        border-radius: 0 22px 22px 0;
        cursor: pointer;
        transition: .25s;
    }

    #search:hover {
        background: #323232;
    }

    #sortname {
        width: 220px;
        height: 42px;
        margin-left: 30px;
        padding: 0 15px;
        border-radius: 25px 0 0 25px;
        border: none;
        background: #222;
        color: white;
    }

    #sort {
        width: 70px;
        height: 42px;
        border: none;
        border-radius: 0 25px 25px 0;
        background: #3ea6ff;
        color: white;
        cursor: pointer;
    }

    .logo {

        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        z-index: 999;
        flex-shrink: 0;
    }

    .logo h1 {
        color: white;
        font-size: 28px;
        margin: 0;
        font-weight: 600;
    }

    /* ---------- User SIGNIN ---------- */


    #userSection {
        flex-shrink: 0;
    }

    #loginBtn {
        padding: 10px 20px;
        border: 1px solid #3ea6ff;
        background: transparent;
        color: #3ea6ff;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: .3s;
    }

    #loginBtn:hover {
        background: #263850;
    }

    #popup {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, .75);
        backdrop-filter: blur(6px);
        z-index: 9999;
    }

    #popupContent {
        width: 380px;
        background: #181818;
        border: 1px solid #333;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, .5);
        animation: popup .35s ease;
    }


    #popupContent h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
    }

    #popupContent input {
        width: 100%;
        margin: 10px 0;
        padding: 14px 18px;
        border: none;
        border-radius: 12px;
        background: #2a2a2a;
        color: white;
        font-size: 15px;
    }

    #popupContent input:focus {
        outline: 2px solid #ff0000;
    }

    #signupBtn {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        background: #ff0000;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: .3s;
    }

    #signupBtn:hover {
        background: #d60000;
    }

    #closeBtn {
        position: absolute;
        top: 18px;
        right: 20px;
        background: none;
        border: none;
        color: white;
        font-size: 22px;
        cursor: pointer;
    }

    /*-------------USER NAME------------*/

    #profile {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
    }

    #avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #ff0000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        font-weight: bold;
        color: white;
    }

    #profile span {
        font-size: 15px;
        font-weight: 500;
    }

    body {
        margin: 0;
        background: #0f0f0f;
        color: white;
        overflow-y: auto;
        height: auto;
    }


    #main {
        flex: 3;
        height: calc(100vh - 90px);
        overflow-y: auto;
        padding-right: 10px;
    }

    #remain {
        flex: 1;
        height: calc(100vh - 90px);
        overflow-y: auto;
        padding-right: 8px;
    }

    h2 {
        margin: 20px 0;
    }

    .actions {
        display: flex;
        gap: 15px;
        margin: 20px 0;
    }

    .actions button {
        background: #272727;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        cursor: pointer;
        transition: .3s;
    }

    .actions button:hover {
        background: #444;
    }

    .channel {
        background: #1c1c1c;
        padding: 20px;
        border-radius: 15px;
        margin: 20px 0;
    }

    .comments {
        margin-top: 30px;
    }

    .comment {
        background: #1d1d1d;
        padding: 15px;
        border-radius: 10px;
        margin: 12px 0;
    }

    .videoCard {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        cursor: pointer;
    }

    .videoCard:hover {
        background: #222;
        border-radius: 10px;
    }

    .videoCard img {
        width: 180px;
        height: 100px;
        border-radius: 10px;
    }

    .videoCard h4 {
        font-size: 15px;
        line-height: 1.4;
    }

    .videoCard p {
        color: #aaa;
        font-size: 13px;
    }

    #container {
        display: grid;
        grid-template-columns: 2.5fr 1fr;
        gap: 25px;
        height: auto;
        margin-top: 70px;
        padding: 20px;
    }

    /* LEFT */

    #main h2 {
        margin: 18px 0;
    }


    /* RIGHT */

    /* one suggested video */

    .videoCard {
        display: flex;
        gap: 12px;
        cursor: pointer;
        transition: .25s;
        padding: 8px;
        border-radius: 12px;
    }

    .videoCard:hover {
        background: #272727;
    }

    .videoCard img {
        width: 170px;
        height: 95px;
        object-fit: cover;
        border-radius: 10px;
    }

    .videoInfo {
        flex: 1;
    }

    .videoInfo h4 {
        font-size: 15px;
        line-height: 1.4;
        margin-bottom: 8px;
    }

    .videoInfo p {
        color: #aaa;
        font-size: 13px;
    }

    #remain::-webkit-scrollbar {
        width: 6px;
    }

    #remain::-webkit-scrollbar-thumb {
        background: #444;
    }

    #main::-webkit-scrollbar,
    #remain::-webkit-scrollbar {
        width: 8px;
    }

    #main::-webkit-scrollbar-thumb,
    #remain::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 20px;
    }

    #main::-webkit-scrollbar-track,
    #remain::-webkit-scrollbar-track {
        background: #111;
    }

    .commentBox {
        display: flex;
        gap: 10px;
        margin: 20px 0;
    }

    .commentBox input {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: #272727;
        color: white;
        font-size: 15px;
    }

    .commentBox button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #3ea6ff;
        color: white;
        cursor: pointer;
    }

    .comment {
        background: #222;
        padding: 15px;
        border-radius: 10px;
        margin: 12px 0;
        font-size: 15px;
    }

    .active {
        background: #3ea6ff !important;
        color: white;
    }

    .channel {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1d1d1d;
        padding: 20px;
        border-radius: 15px;
        margin: 25px 0;
    }

    .channelLeft {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .avatar {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: #ff3d00;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
    }

    #subscribeBtn {
        background: #ffffff;
        color: #000;
        border: none;
        padding: 12px 28px;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: .3s;
    }

    #subscribeBtn:hover {
        background: #ddd;
    }

    .subscribed {
        background: #272727 !important;
        color: white !important;
    }

    .description {
        background: #272727;
        padding: 18px;
        border-radius: 15px;
        margin: 18px 0;
    }

    #descText {
        max-height: 90px;
        overflow: hidden;
        transition: .3s;
    }

    .show {
        max-height: 1000px !important;
    }

    #showMore {
        margin-top: 12px;
        color: #3ea6ff;
        cursor: pointer;
        font-weight: bold;
    }

    #loginBtn svg {
        display: none;
    }

    /* ---------- MOBILE ---------- */

    @media(max-width:1200px) {
        .videoCard {
            display: flex;
            flex-direction: column;
        }
    }

    @media(max-width:900px) {

        #query {
            width: 220px;
        }


        #sideMenu {
            width: 70px;
            padding: 10px 6px;
            overflow-x: hidden;
        }

        #sideMenu h1 {
            font-size: 12px;
            text-align: center;
            padding: 18px 5px;
        }

        #searchresults {
            margin-left: 90px;
        }

        #sortname,
        #sort {
            display: none;
        }

        .menuItem {
            justify-content: center;
            padding: 14px 0;
            gap: 0;
        }

        .menuItem span {
            display: none;
        }

        .menuItem svg {
            width: 24px;
            height: 24px;
        }

        .logout {
            justify-content: center;
        }

        .divider {
            width: 100%;
        }

        #container {
            display: flex;
            flex-direction: column;
        }

        #main {
            width: 100%;
        }

        #remain {
            width: 100%;
            margin-top: 20px;
        }

        .videoCard {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .videoCard img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .videoInfo {
            padding: 0 5px;
        }

        .videoInfo h4 {
            font-size: 15px;
            line-height: 1.4;
        }

        .videoInfo p {
            font-size: 13px;
            color: #aaa;
        }

        html {
            height: auto;
            overflow-y: auto;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: auto;
            overflow: visible;
        }

        #main,
        #remain {
            height: auto;
            overflow: visible;
        }


    }

    /* Tablets & Small Laptops */
    @media (max-width:750px) {

        /* Hide only YouTube text */
        .logo h1 {
            display: none;
        }

        /* Make logo smaller */
        .logo svg {
            width: 32px;
            height: 24px;
        }

        /* Reduce navbar padding */
        #navbar {
            padding: 0 12px;
        }

        /* Search section takes remaining space */
        .searchContainer {
            flex: 1;
            margin: 0 15px;
        }

        /* Responsive search bar */
        #query {
            width: 100%;
            max-width: 350px;
            font-size: 14px;
        }

        /* Smaller search button */
        #search {
            width: 50px;
        }

        /* Smaller login button */
        #loginBtn {
            padding: 8px 14px;
            font-size: 13px;
        }

        /* Smaller profile (after login) */
        #profile span {
            font-size: 13px;
        }

        #avatar {
            width: 36px;
            height: 36px;
            font-size: 15px;
        }
    }

    @media (max-width:600px) {

        /* #main iframe {
            height: 250px;
        } */

    }

    @media (max-width:400px) {

        /* Hide YouTube text */
        .logo {
            display: none;
        }

        /* Hide Welcome text */
        .welcomeText {
            display: none;
        }

        /* Hide Sign In button */
        #loginBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loginBtn svg {
            display: block;
        }

        /* Show only avatar */
        #avatar {
            width: 38px;
            height: 38px;
            font-size: 16px;
        }

        .avatar {
            display: none;
        }

        /* Keep profile centered */
        #profile {
            gap: 0;
        }

        /* Search occupies maximum space */
        .searchContainer {
            margin: 0 10px;
        }

        #query {
            width: 100%;
        }

        #guestProfile {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: .3s;
        }

        #guestProfile:hover {

            background: #272727;
        }

        .loginIcon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loginText {
            display: none;
        }

        .actions {
            gap: 5px;
        }

    }
</style>

    function showSidebar() {

        remain.innerHTML = "";

        let x = JSON.parse(localStorage.getItem("all vdo"))

        allVideos.forEach((el) => {

            // Don't show the currently playing video
            if (el.id.videoId === video.id.videoId) return;

            let card = document.createElement("div");
            card.onclick = () => {


                // Save the selected video
                localStorage.setItem("clicked vdo", JSON.stringify(el));



                // Refresh UI
                display(video);
                loadComments(video);
                likeSystem(video);
                subscribeSystem(video);
                showSidebar();
                location.reload();
            };
            card.className = "videoCard";

            card.innerHTML = `
            <img src="${el.snippet.thumbnails.medium.url}">

            <div class="videoInfo">
                <h4>${el.snippet.title}</h4>

                <p>${el.snippet.channelTitle}</p>

                <p>2.1M views • 5 days ago</p>
            </div>
        `;

            remain.append(card);
        });

    }
    function addComment() {

        const input = document.getElementById("commentInput");

        if (input.value.trim() == "") return;

        let comments =
            JSON.parse(localStorage.getItem(video.id.videoId + "comments"))
            || [];

        comments.push(input.value);

        localStorage.setItem(
            video.id.videoId + "comments",
            JSON.stringify(comments)
        );

        input.value = "";

        loadComments();

    }
    function loadComments() {

        const list = document.getElementById("commentList");

        list.innerHTML = "";

        let comments =
            JSON.parse(localStorage.getItem(video.id.videoId + "comments"))
            || [];

        comments.reverse().forEach(comment => {

            let div = document.createElement("div");

            div.className = "comment";

            div.innerHTML = `

            👤 <b>You</b>

            <br><br>

            ${comment}

        `;

            list.append(div);

        });

    }
    function likeSystem() {

        const like = document.getElementById("likeBtn");

        const dislike = document.getElementById("dislikeBtn");

        let state =
            JSON.parse(localStorage.getItem(video.id.videoId + "like"))
            || "";

        if (state == "like")
            like.classList.add("active");

        if (state == "dislike")
            dislike.classList.add("active");

        like.onclick = function () {

            like.classList.toggle("active");

            dislike.classList.remove("active");

            if (like.classList.contains("active")) {

                localStorage.setItem(
                    video.id.videoId + "like",
                    JSON.stringify("like")
                );

            } else {

                localStorage.removeItem(video.id.videoId + "like");

            }

        }

        dislike.onclick = function () {

            dislike.classList.toggle("active");

            like.classList.remove("active");

            if (dislike.classList.contains("active")) {

                localStorage.setItem(
                    video.id.videoId + "like",
                    JSON.stringify("dislike")
                );

            } else {

                localStorage.removeItem(video.id.videoId + "like");

            }

        }

    }

    showSidebar();
    display(video);


    function subscribeSystem() {
        console.log("clicked")

        const btn = document.getElementById("subscribeBtn");

        if (!btn) return;

        const key = "subscribe_" + video.id.videoId;

        let subscribed = JSON.parse(localStorage.getItem(key)) || false;

        updateButton();

        btn.addEventListener("click", () => {

            subscribed = !subscribed;

            localStorage.setItem(key, JSON.stringify(subscribed));

            updateButton();

        });

        function updateButton() {

            btn.textContent = subscribed ? "Unsubscribe" : "Subscribe";

            btn.style.background = subscribed ? "#272727" : "#dc143c";

            btn.style.color = "#fff";
        }
    }



    const show = document.getElementById("showMore");
    const desc = document.getElementById("descText");

    show.onclick = () => {

        desc.classList.toggle("show");

        show.innerText =
            desc.classList.contains("show")
                ? "Show less"
                : "Show more";
    };

    likeSystem();
    loadComments();
    subscribeSystem()

    document
        .getElementById("commentBtn")
